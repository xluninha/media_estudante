<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problema média do aluno</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<header>
    <h1>LunasitesÚteis</h1>
</header>
<body>
    <h1>Site pra calcular a média do seu aluno desgraçado 100% confiável<h1>
    <p>Clique no botão abaixo para calcular a média do aluno</p>

    <div>
        <label>Nota 1: </label>
        <input type="number" id="nota1" placeholder="Digite a primeira nota">
    </div>
    
    <div>
        <label>Nota 2: </label>
        <input type="number" id="nota2" placeholder="Digite a segunda nota">
    </div>

    <button id="btnCalcular">Ver média</button>

    <div id="resultado"></div>

    <script src="main.js"></script>
</body>
</html>
